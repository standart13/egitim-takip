<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personel Eğitim Takip</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div class="max-w-7xl mx-auto bg-white p-6 rounded-lg shadow-lg">
        <h1 class="text-2xl font-bold mb-6 text-gray-800">Eğitim Katılım Takip Sistemi</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <input type="text" id="search" placeholder="İsim veya Sicil Ara..." class="p-2 border rounded">
            <select id="filter-bolum" class="p-2 border rounded"><option value="">Tüm Bölümler</option></select>
            <select id="filter-dept" class="p-2 border rounded"><option value="">Tüm Departmanlar</option></select>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-200">
                        <th class="p-2 border">Sicil</th>
                        <th class="p-2 border">Ad Soyad</th>
                        <th class="p-2 border">Bölüm</th>
                        <th class="p-2 border">Dpt.</th>
                        <th class="p-2 border">Eğitimler</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr><td colspan="5" class="p-4 text-center">Veriler yükleniyor...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let employees = [];

        async function loadData() {
            try {
                const response = await fetch('data.json?v=' + Date.now());
                employees = await response.json();
                
                // Filtreleri doldur
                const bolumler = [...new Set(employees.map(e => String(e.bolumKodu)).filter(Boolean))].sort();
                const deptler = [...new Set(employees.map(e => String(e.deptKodu)).filter(Boolean))].sort();
                
                const bSelect = document.getElementById('filter-bolum');
                const dSelect = document.getElementById('filter-dept');
                
                bolumler.forEach(b => bSelect.innerHTML += `<option value="${b}">${b}</option>`);
                deptler.forEach(d => dSelect.innerHTML += `<option value="${d}">${d}</option>`);
                
                renderTable();
            } catch (error) {
                document.getElementById('table-body').innerHTML = '<tr><td colspan="5">Veri yüklenemedi.</td></tr>';
            }
        }

        function renderTable() {
            const search = document.getElementById('search').value.toLowerCase();
            const bolum = document.getElementById('filter-bolum').value;
            const dept = document.getElementById('filter-dept').value;
            const tbody = document.getElementById('table-body');
            
            const filtered = employees.filter(e => {
                const matchSearch = e.adSoyad.toLowerCase().includes(search) || e.sicil.includes(search);
                const matchBolum = !bolum || String(e.bolumKodu) === bolum;
                const matchDept = !dept || String(e.deptKodu) === dept;
                return matchSearch && matchBolum && matchDept;
            });

            tbody.innerHTML = filtered.map(e => `
                <tr class="hover:bg-gray-50">
                    <td class="p-2 border">${e.sicil}</td>
                    <td class="p-2 border">${e.adSoyad}</td>
                    <td class="p-2 border">${e.bolumKodu}</td>
                    <td class="p-2 border">${e.deptKodu}</td>
                    <td class="p-2 border text-xs">
                        ${e.egitimler.map(eg => `<span class="inline-block bg-blue-100 m-1 p-1 rounded">${eg.ad} (${eg.tarih})</span>`).join('')}
                    </td>
                </tr>
            `).join('');
        }

        document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', renderTable));
        window.onload = loadData;
    </script>
</body>
</html>
