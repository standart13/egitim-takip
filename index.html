<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eğitim Takip Matrisi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .sticky-col { position: sticky; left: 0; background: white; z-index: 10; border-right: 2px solid #e5e7eb; }
        .sticky-col-2 { position: sticky; left: 80px; background: white; z-index: 10; border-right: 2px solid #e5e7eb; }
    </style>
</head>
<body class="bg-slate-50 text-[11px]">
    <div class="flex flex-col h-screen">
        <header class="bg-white border-b p-4 shadow-sm">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-xl font-bold text-slate-800">Eğitim Takip Matrisi</h1>
                <div class="flex gap-2">
                    <input type="text" id="search" placeholder="Sicil/İsim Ara..." class="border p-2 rounded w-64 outline-none focus:ring-1 focus:ring-blue-500">
                    <select id="f-bolum" class="border p-2 rounded bg-white"><option value="">Tüm Bölümler</option></select>
                    <select id="f-dept" class="border p-2 rounded bg-white"><option value="">Tüm Departmanlar</option></select>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-auto p-4">
            <div class="bg-white border rounded shadow-sm overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead id="t-head" class="bg-slate-100 sticky top-0 z-20"></thead>
                    <tbody id="t-body" class="divide-y"></tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        let employees = [];
        let trainings = [];

        async function loadData() {
            try {
                const res = await fetch('data.json?v=' + Date.now());
                employees = await res.json();
                
                if(employees.length > 0) {
                    trainings = Object.keys(employees[0].records);
                    setupFilters();
                    renderApp();
                }
            } catch (e) {
                document.getElementById('t-body').innerHTML = '<tr><td class="p-4 text-red-500">Veri yüklenemedi. data.json kontrol edin.</td></tr>';
            }
        }

        function setupFilters() {
            const b = [...new Set(employees.map(e => String(e.bolumKodu)).filter(Boolean))].sort();
            const d = [...new Set(employees.map(e => String(e.deptKodu)).filter(Boolean))].sort();
            b.forEach(v => document.getElementById('f-bolum').innerHTML += `<option value="${v}">${v}</option>`);
            d.forEach(v => document.getElementById('f-dept').innerHTML += `<option value="${v}">${v}</option>`);
        }

        function renderApp() {
            const s = document.getElementById('search').value.toLowerCase();
            const fb = document.getElementById('f-bolum').value;
            const fd = document.getElementById('f-dept').value;

            const head = `<tr>
                <th class="p-2 border sticky top-0 bg-slate-100 z-30 sticky-col w-20">Sicil</th>
                <th class="p-2 border sticky top-0 bg-slate-100 z-30 sticky-col-2 w-40">Ad Soyad</th>
                <th class="p-2 border sticky top-0 bg-slate-100">Bölüm</th>
                <th class="p-2 border sticky top-0 bg-slate-100">Dept</th>
                ${trainings.map(t => `<th class="p-2 border sticky top-0 bg-slate-100 min-w-[100px] text-center">${t}</th>`).join('')}
            </tr>`;
            document.getElementById('t-head').innerHTML = head;

            const filtered = employees.filter(e => {
                return (e.name.toLowerCase().includes(s) || e.sicil.includes(s)) &&
                       (!fb || String(e.bolumKodu) === fb) &&
                       (!fd || String(e.deptKodu) === fd);
            });

            document.getElementById('t-body').innerHTML = filtered.map(e => `
                <tr>
                    <td class="p-2 border sticky-col font-bold">${e.sicil}</td>
                    <td class="p-2 border sticky-col-2 font-medium">${e.name}</td>
                    <td class="p-2 border text-slate-500">${e.bolumKodu}</td>
                    <td class="p-2 border text-slate-500">${e.deptKodu}</td>
                    ${trainings.map(t => {
                        const date = e.records[t] || '-';
                        const isDone = date !== '-';
                        return `<td class="p-2 border text-center ${isDone ? 'bg-green-50 text-green-700 font-bold' : 'text-slate-300'}">${date}</td>`;
                    }).join('')}
                </tr>
            `).join('');
        }

        document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', renderApp));
        window.onload = loadData;
    </script>
</body>
</html>
